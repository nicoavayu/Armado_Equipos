<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/16x16.png">
    <link rel="shortcut icon" href="/32x32.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <link rel="canonical" href="https://app.arma2.com.ar/" />
    <script>
      (function redirectLegacyProductionHost() {
        var legacyProductionHostnames = [
          'arma2.vercel.app',
          'arma2-nicoavayus-projects.vercel.app'
        ];
        if (legacyProductionHostnames.indexOf(window.location.hostname.toLowerCase()) === -1) return;
        window.location.replace(
          'https://app.arma2.com.ar' + window.location.pathname + window.location.search + window.location.hash
        );
      }());
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />

    />

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will

    -->
    <title>Arma2</title>
