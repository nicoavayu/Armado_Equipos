<!doctype html>
<html lang="es" data-page="mobile-only">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0a1d" />
    <meta name="robots" content="index,follow" />
    <meta
      name="description"
      content="Descargá Arma2 y viví tu fútbol amateur desde la aplicación mobile."

    <link rel="icon" type="image/png" sizes="32x32" href="/32x32.png" />
    <link rel="stylesheet" href="/web-access.css" />

      <span class="gate-orbit gate-orbit--two"></span>
      <span class="gate-field-lines"></span>

          <img src="/logo_arma2.png" alt="Arma2" class="gate-logo" width="601" height="418" />

        <div class="gate-copy">

        </div>

        <div class="gate-store-actions" aria-label="Descargar Arma2">
          <a
            class="gate-store-button gate-store-button--apple"
            href="https://apps.apple.com/ar/app/arma2/id6760599244"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Descargar Arma2 en App Store"

            </svg>
            <span>Descargar en App Store</span>
          </a>
          <div
            class="gate-store-button gate-store-button--google gate-store-button--unavailable"
            aria-label="Arma2 próximamente en Google Play"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">

            </svg>
            <span>Próximamente en Google Play</span>

    <script src="/web-access.js" defer></script>

</html>
