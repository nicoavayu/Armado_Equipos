[functions.join-match-guest]
verify_jwt = false

# Public guest voting-photo flow. Both are anon-callable; the capability token
# (issued/consumed here) is the authorization, not a JWT.
[functions.issue-voting-photo-token]
verify_jwt = false

[functions.upload-voting-photo]
verify_jwt = false

[functions.accept-invite]
verify_jwt = true

[functions.delete-account]
verify_jwt = true

[functions.push-sender]
verify_jwt = true

[functions.push-dispatch-now]
verify_jwt = true

# push-auto-match-now trusts the JWT sub without verifying the signature
# itself, so the platform gateway MUST verify it. Never set this to false.
[functions.push-auto-match-now]
verify_jwt = true
