name: Prelaunch Quality Gate

on:
  push:
    branches: [main, prelaunch-hardening]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Use npm 11
        run: npm install -g npm@11

      - name: Print runtime versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci --no-audit --fund=false --loglevel verbose

      - name: Prepare public env file
        run: cp .env.example .env

      - name: Guard migration source
        run: npm run migrations:guard

      - name: Run PostgreSQL integration suite
        run: npm run test:db

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run full Jest suite
        run: npm run test:ci
